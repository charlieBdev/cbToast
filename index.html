<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cbToast Demo</title>
  <link rel="stylesheet" href="./cbToast/cbToast.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  
  <main>
    <h1>cbToast Demo</h1>

    <section id="demo-instructions" style="margin-bottom: 30px; color: #555; max-width: 600px; line-height: 1.6;">
      <pre style="background: #eee; padding: 15px; border-radius: 8px; text-align: left; font-size: 0.85rem;">
        <span style="color: #007bff;">new</span> <span style="color: #28a745;">cbToast</span>({
          title: <span style="color: #e83e8e;">'Success'</span>,
          message: <span style="color: #e83e8e;">'Item Saved!'</span>,
          type: <span style="color: #e83e8e;">'success'</span>,
          position: <span style="color: #e83e8e;">'bottom-right'</span>,
          duration: <span style="color: #007bff;">4000</span>,
          countdown: <span style="color: #007bff;">true</span>,
          maxStack: <span style="color: #007bff;">5</span>,
          lightMode: <span style="color: #007bff;">false</span>
        });
      </pre>
    </section>
    <section id="btn-container">
      <button id="defaultBtn">Show Default Toast</button>
      <button id="infoBtn">Show Info Toast</button>
      <button id="successBtn">Show Success Toast</button>
      <button id="warningBtn">Show Warning Toast</button>
      <button id="errorBtn">Show Error Toast</button>
      <button id="lightModeBtn">Show Light Mode Toast</button>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
