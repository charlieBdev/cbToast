<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cbToast Demo</title>
  <link rel="stylesheet" href="./cbToast/cbToast.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  
  <main>
    <h1>cbToast Demo</h1>

    <section id="demo-instructions">
      <div class="code-window">
        <div class="window-header">
          <div class="action-btns">
            <span></span><span></span><span></span>
          </div>
          <div class="window-title">main.js</div>
        </div>
        <pre><code><span class="keyword">new</span> <span class="method">cbToast</span>({
          title: <span class="string">'Success'</span>,
          message: <span class="string">'Item Saved!'</span>,
          type: <span class="string">'success'</span>,
          position: <span class="string">'bottom-right'</span>,
          duration: <span class="number">4000</span>,
          countdown: <span class="keyword">true</span>,
          maxStack: <span class="number">5</span>,
          onClose: () => <span class="console">console</span>.<span class="method">log</span>(<span class="string">'Closed!'</span>)
        });</code></pre>
      </div>
    </section>

    <section id="btn-container">
      <button id="defaultBtn">Default Toast</button>
      <button id="infoBtn">Info Toast</button>
      <button id="successBtn">Success Toast</button>
      <button id="warningBtn">Warning Toast</button>
      <button id="errorBtn">Error Toast</button>
      <button id="lightModeBtn">Light Mode Toast</button>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
